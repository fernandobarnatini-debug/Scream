name: Windows Build

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - '.github/workflows/windows.yml'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Publish (self-contained single file)
        shell: pwsh
        run: >
          dotnet publish windows/Scream.Windows/Scream.Windows.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath Scream-Windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scream-Windows
          path: Scream-Windows.zip
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Scream for Windows $tag"
          }
          gh release upload $tag Scream-Windows.zip --clobber
